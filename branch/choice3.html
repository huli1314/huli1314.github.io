<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>选择 · 报警吗？</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: monospace;
        }
        .container {
            max-width: 500px;
            background: #111;
            border: 1px solid #333;
            padding: 40px;
            text-align: center;
        }
        .question {
            font-size: 18px;
            color: #c44;
            margin-bottom: 30px;
        }
        .desc {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-yes {
            background: #2a2a2a;
            color: #c44;
            border: 1px solid #c44;
        }
        .btn-yes:hover {
            background: #c44;
            color: #fff;
        }
        .btn-no {
            background: #2a2a2a;
            color: #888;
            border: 1px solid #444;
        }
        .btn-no:hover {
            background: #444;
            color: #fff;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #666;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="question">⚠️ 报警吗？ ⚠️</div>
    <div class="desc">
        警察说“成年人失踪要48小时”。<br>
        但你知道，等48小时后可能就来不及了。<br>
        你要报警吗？
    </div>
    <div class="buttons">
        <button class="btn btn-yes" onclick="localStorage.setItem('choice3', 'yes'); window.location.href='choice4.html'">报警</button>
        <button class="btn btn-no" onclick="localStorage.setItem('choice3', 'no'); window.location.href='choice4.html'">自己查</button>
    </div>
    <a href="../index.html" class="back-link">← 返回微博</a>
</div>
<script src="../js/meta.js"></script>
</body>
</html>
