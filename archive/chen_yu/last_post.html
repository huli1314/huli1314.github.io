        <p>2023年9月1日 03:14</p>
        <p>草稿箱 · 未发送</p>
        <hr style="border-color:#333; margin:16px 0;">
        <p>我开门了。</p>
        <p>楼道里没有人。但是脚步声还在。</p>
        <p>从一楼上来，一步一步。</p>
        <p>我数了。从1楼到6楼，一共6声。</p>
        <p>第6声停在我门口。</p>
        <p>纸条上的问题：“你听到的是第几声？”</p>
        <p>答案是6。</p>
        <p>但我没有回答。</p>
        <p>因为当我转身回屋的时候，门后面站着一个人。</p>
        <p>没有脸。</p>
        <p>和我女儿画的一模一样。</p>
        <p>它说：“第六个。欢迎。”</p>
        <p>然后我就在这里了。</p>
        <p>我不知道这里是哪。</p>
        <p>如果你看到这条，别住601。</p>
