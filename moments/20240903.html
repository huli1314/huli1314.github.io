<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>朋友圈</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body {
            background: #ededed;
        }
        .moments-container {
            max-width: 500px;
            margin: 20px auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
        }
        .header {
            background: #fff;
            padding: 16px;
            border-bottom: 1px solid #dbdbdb;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        .back-link {
            display: block;
            padding: 16px;
            text-align: center;
            color: #576b95;
            text-decoration: none;
            border-top: 1px solid #f0f0f0;
            background: #fff;
        }
    </style>
</head>
<body>
<div class="moments-container">
    <div class="header">朋友圈</div>
    
    <div class="moment-card">
        <div class="moment-header">
            <div class="moment-avatar">苏</div>
            <div>
                <div class="moment-name">苏晚</div>
                <div class="moment-time">2024-09-03 10:20</div>
            </div>
        </div>
        <div class="moment-content">
            <p>林述两天没回家了。电话打不通。有人见过他吗？</p>
            <p style="color:#c44;">如果你看到，让他联系我。</p>
        </div>
    </div>

    <div class="moment-card">
        <div class="moment-header">
            <div class="moment-avatar">王</div>
            <div>
                <div class="moment-name">王秀兰</div>
                <div class="moment-time">2024-09-03 11:02</div>
            </div>
        </div>
        <div class="moment-content">
            <p>小苏，报警了吗？</p>
        </div>
    </div>

    <div class="moment-card">
        <div class="moment-header">
            <div class="moment-avatar">苏</div>
            <div>
                <div class="moment-name">苏晚</div>
                <div class="moment-time">2024-09-03 11:05</div>
            </div>
        </div>
        <div class="moment-content">
            <p>报了。警察说成年人失踪要48小时。让我等。</p>
        </div>
    </div>

    <a href="../index.html" class="back-link">← 返回微博</a>
</div>
<script src="../js/meta.js"></script>
</body>
</html>
