<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>星月图文快印 · 大众点评</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body {
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
        }
        .shop-header {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .shop-name {
            font-size: 22px;
            font-weight: bold;
        }
        .shop-stars {
            color: #ff8200;
            margin: 8px 0;
        }
        .review {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .review-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .review-avatar {
            width: 40px;
            height: 40px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .review-name {
            font-weight: bold;
            font-size: 14px;
        }
        .review-time {
            font-size: 11px;
            color: #999;
        }
        .review-content {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        .back-link {
            display: block;
            padding: 16px;
            text-align: center;
            background: #fff;
            color: #ff8200;
            text-decoration: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="shop-header">
        <div class="shop-name">星月图文快印</div>
        <div class="shop-stars">★★★★☆ 4.2分</div>
        <div style="font-size:12px; color:#666;">翠苑三区底商12号 · 图文打印</div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">林</div>
            <div>
                <div class="review-name">linshu_2024</div>
                <div class="review-time">2024-08-05</div>
            </div>
        </div>
        <div class="review-content">
            老板人挺好的，价格便宜。就是聊天的时候感觉他话里有话，问我住哪一幢，我说6幢，他愣了一下。
        </div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">陈</div>
            <div>
                <div class="review-name">chenyu_2023</div>
                <div class="review-time">2023-07-20</div>
            </div>
        </div>
        <div class="review-content">
            老板人不错。打印速度快。推荐。
        </div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">匿</div>
            <div>
                <div class="review-name">匿名用户</div>
                <div class="review-time">2023-10-15</div>
            </div>
        </div>
        <div class="review-content">
            ⭐ 这家店老板会给你塞奇怪的东西。别去601。别问为什么。
        </div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">方</div>
            <div>
                <div class="review-name">fangmin_</div>
                <div class="review-time">2024-01-20</div>
            </div>
        </div>
        <div class="review-content">
            老板，你认识陈屿吗？他最后一次来你店里打印了什么？
        </div>
        <div class="review-content" style="margin-top:8px; background:#f5f5f5; padding:8px; border-radius:8px;">
            <strong>老板回复：</strong> 小姑娘，你老公打印的是一份寻人启事。他自己的寻人启事。
        </div>
    </div>

    <a href="../index.html" class="back-link">← 返回微博</a>
</div>
<script src="../js/meta.js"></script>
</body>
</html>
