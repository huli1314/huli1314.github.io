<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>老周馄饨 · 大众点评</title>
    <link rel="stylesheet" href="../css/common.css">
    <style>
        body {
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
        }
        .shop-header {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #eee;
        }
        .shop-name {
            font-size: 22px;
            font-weight: bold;
        }
        .shop-stars {
            color: #ff8200;
            margin: 8px 0;
        }
        .review {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .review-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .review-avatar {
            width: 40px;
            height: 40px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .review-name {
            font-weight: bold;
            font-size: 14px;
        }
        .review-time {
            font-size: 11px;
            color: #999;
        }
        .review-content {
            font-size: 14px;
            line-height: 1.5;
            color: #333;
        }
        .back-link {
            display: block;
            padding: 16px;
            text-align: center;
            background: #fff;
            color: #ff8200;
            text-decoration: none;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="shop-header">
        <div class="shop-name">老周馄饨</div>
        <div class="shop-stars">★★★★☆ 4.5分</div>
        <div style="font-size:12px; color:#666;">翠苑三区底商8号 · 小吃快餐</div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">林</div>
            <div>
                <div class="review-name">linshu_2024</div>
                <div class="review-time">2024-08-12</div>
            </div>
        </div>
        <div class="review-content">
            馄饨不错。老板问我住哪，我说6幢。他说“6幢啊……之前有一家三口也常来，后来没见了”。问他搬走了吗？他没说话。
        </div>
    </div>

    <div class="review">
        <div class="review-user">
            <div class="review-avatar">方</div>
            <div>
                <div class="review-name">fangmin_</div>
                <div class="review-time">2023-09-20</div>
            </div>
        </div>
        <div class="review-content">
            老板，你见过我老公吗？他叫陈屿，住601。
        </div>
        <div class="review-content" style="margin-top:8px; background:#f5f5f5; padding:8px; border-radius:8px;">
            <strong>老板回复：</strong> 小姑娘，你老公最后一次来我这里，是8月31号晚上。他一个人。他说“老板，我可能也要走了”。我问去哪，他没说。
        </div>
    </div>

    <a href="../index.html" class="back-link">← 返回微博</a>
</div>
<script src="../js/meta.js"></script>
</body>
</html>
