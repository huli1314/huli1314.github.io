<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>林述的微博</title>
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border-left: 3px solid #c44;
        }
        .back-link {
            display: block;
            padding: 16px;
            text-align: center;
            color: #ff8200;
            text-decoration: none;
            border-top: 1px solid #f0f0f0;
        }
        .comment-section {
            background: #fafafa;
            padding: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .comment {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="weibo-card" style="margin:0; border-radius:0;">
        <div class="card-header">
            <div class="avatar">林</div>
            <div class="user-info">
                <div class="name">林述的日常</div>
                <div class="time">2024-09-15 03:14 · 微博客户端</div>
            </div>
        </div>
        <div class="content">
            <p>我在查陈屿。</p>
            <p>他的微博还在，但已经注销了。</p>
            <p>他2023年住的就是601。</p>
            <p>他的最后一条微博是2023-09-01。</p>
            <p>整整一年前。</p>
            <p style="color:#c44; margin-top:10px;">和我同一天。</p>
        </div>
        <div class="actions"><span>❤️ ?</span> <span>💬 ?</span> <span>🔄 ?</span></div>
    </div>
    <div class="comment-section">
        <div class="comment"><strong>系统提示：</strong> 该账号已被盗用。此条微博不是林述本人发布。</div>
        <div class="comment"><strong>苏晚不晚：</strong> 林述？你手机呢？你人在哪？</div>
        <div class="comment"><strong>翠苑王阿姨：</strong> 造孽啊……又来一个。</div>
    </div>
    <a href="../../index.html" class="back-link">← 返回首页</a>

</html>
