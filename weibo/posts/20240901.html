<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>林述的微博</title>
    <link rel="stylesheet" href="../../css/common.css">
    <style>
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            border-left: 3px solid #c44;
        }
        .back-link {
            display: block;
            padding: 16px;
            text-align: center;
            color: #ff8200;
            text-decoration: none;
            border-top: 1px solid #f0f0f0;
        }
        .comment-section {
            background: #fafafa;
            padding: 16px;
            border-top: 1px solid #f0f0f0;
        }
        .comment {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .paper {
            background: #f9f1e0;
            padding: 15px;
            margin: 15px 0;
            font-family: monospace;
            text-align: center;
            border-radius: 4px;
            border: 1px dashed #c44;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="weibo-card" style="margin:0; border-radius:0;">
        <div class="card-header">
            <div class="avatar">林</div>
            <div class="user-info">
                <div class="name">林述的日常</div>
                <div class="time">2024-09-01 01:58 · 微博客户端</div>
            </div>
        </div>
        <div class="content">
            <p>有人敲门。很轻，三下，停，三下。</p>
            <p>猫眼里什么也没有。</p>
            <p>但门缝下面塞进来一张纸条。</p>
            <div class="paper">
                “601之前住的人，也问过同样的问题。”
            </div>
            <p>601之前住的是谁？</p>
        </div>
        <div class="actions"><span>❤️ 345</span> <span>💬 156</span> <span>🔄 67</span></div>
    </div>
    <div class="comment-section">
        <div class="comment"><strong>苏晚不晚：</strong> 你别吓我。今晚别开门了。</div>
        <div class="comment"><strong>翠苑王阿姨：</strong> 小伙子，纸条别扔。留着。</div>
        <div class="comment"><strong>林述的日常：</strong> 回复 @翠苑王阿姨：留着有什么用？阿姨你知道601之前住的是谁吗？</div>
        <div class="comment"><strong>翠苑王阿姨：</strong> 回复 @林述的日常：……你自己查吧。搜“陈屿”。</div>
        <div class="comment"><strong>系统提示：</strong> 该用户最后登录：2024-09-01 02:14 · 来自翠苑三区</div>
    </div>
    <a href="../../index.html" class="back-link">← 返回首页</a>
</div>

</html>
